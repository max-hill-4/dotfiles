# ============================================================
# tmux config — friendly & vim-ish
# ============================================================

# -- behaviour ------------------------------------------------
set -g default-shell /usr/bin/fish
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"   # true colour
set -ga terminal-overrides ",xterm-256color:Cr=\\E]112\\7"  # suppress OSC 11 bg query leak
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 50000
set -g display-time 2000                           # msg display ms
set -g focus-events on
set -g allow-rename off                            # keep window names stable
setw -g mode-keys vi

# -- prefix (Ctrl+a) ------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# -- pane splitting (intuitive, keep cwd) ----------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"   # unshifted \
unbind '"'
unbind %

# -- claude /fork into split pane ------------------------------
bind f run-shell "claude-fork #{pane_id}"

# -- direct window switching (Alt+1–5, no prefix) ----------------
bind -n M-1 run-shell '~/.local/bin/tmux-goto-window 1'
bind -n M-2 run-shell '~/.local/bin/tmux-goto-window 2'
bind -n M-3 run-shell '~/.local/bin/tmux-goto-window 3'
bind -n M-4 run-shell '~/.local/bin/tmux-goto-window 4'
bind -n M-5 run-shell '~/.local/bin/tmux-goto-window 5'

# -- Ctrl+hjkl: navigate panes (no prefix) --------------------
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# -- prefix+hjkl: open pane in that direction --------------------
bind h split-window -h -b -c "#{pane_current_path}"
bind j split-window -v -c "#{pane_current_path}"
bind k split-window -v -b -c "#{pane_current_path}"
bind l split-window -h -c "#{pane_current_path}"

# -- vim-style pane resize (repeatable) -----------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# -- vim-style copy mode --------------------------------------
bind [ copy-mode
bind ] paste-buffer
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# -- window navigation -----------------------------------------
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+
bind n new-window -c "#{pane_current_path}"        # keep cwd on new window
bind t new-window -c "#{pane_current_path}"        # open tab
bind w kill-window                                 # close tab

# -- on last window closed, switch to another session instead of detaching
set -g detach-on-destroy off
set-hook -g session-closed 'run-shell ~/.local/bin/tmux-renumber-sessions'

# -- cycle next session -----------------------------------------
bind Tab switch-client -n

# -- quick session / window ------------------------------------
bind c new-window -c "#{pane_current_path}"
bind R command-prompt 'rename-window %%'
bind S command-prompt 'rename-session %%'

# -- direct session switching (F1–F12, by position, no prefix) --
bind -n F1 run-shell '~/.local/bin/tmux-goto 1 --create'
bind -n F2 run-shell '~/.local/bin/tmux-goto 2 --create'
bind -n F3 run-shell '~/.local/bin/tmux-goto 3 --create'
bind -n F4 run-shell '~/.local/bin/tmux-goto 4 --create'
bind -n F5 run-shell '~/.local/bin/tmux-goto 5 --create'
bind -n F6 run-shell '~/.local/bin/tmux-goto 6 --create'
bind -n F7 run-shell '~/.local/bin/tmux-goto 7 --create'
bind -n F8 run-shell '~/.local/bin/tmux-goto 8 --create'
bind -n F9 run-shell '~/.local/bin/tmux-goto 9 --create'
bind -n F10 run-shell '~/.local/bin/tmux-goto 10 --create'
bind -n F11 run-shell '~/.local/bin/tmux-goto 11 --create'
bind -n F12 run-shell '~/.local/bin/tmux-goto 12 --create'

# -- swap windows left/right -----------------------------------
bind -r < swap-window -t -1
bind -r > swap-window -t +1

# -- reload config ---------------------------------------------
bind r source-file ~/.tmux.conf \; display "config reloaded ✓"

# -- status bar (clean, informative) ---------------------------
set -g status-position top
set -g status-justify left
set -g status-style bg=#1a1b26,fg=#a9b1d6
set -g status-left-length 50
set -g status-left '#[fg=#1a1b26,bg=#7aa2f7,bold]  #S/#(tmux list-sessions 2>/dev/null | wc -l | tr -d " ") #[bg=#1a1b26,fg=#7aa2f7]#[fg=#565f89] #[default]'
set -g status-right '#[fg=#9ece6a]#(uptime -p 2>/dev/null | sed "s/up //") #[fg=#565f89]│ #[fg=#bb9af7]%a %d %b #[fg=#565f89]│ #[fg=#7dcfff]%H:%M #[default]'
setw -g window-status-format '#[fg=#565f89] #I #[fg=#a9b1d6]#W#[fg=#565f89]#F '
setw -g window-status-current-format '#[fg=#1a1b26,bg=#7aa2f7,bold] #I #W #[fg=#7aa2f7,bg=#1a1b26]#[fg=#c0caf5,bold]#F '
setw -g window-status-separator ''

# -- pane border styling ---------------------------------------
set -g pane-border-style fg=#565f89
set -g pane-active-border-style fg=#7aa2f7
set -g pane-border-lines heavy

# -- message styling -------------------------------------------
set -g message-style bg=#7aa2f7,fg=#1a1b26,bold
set -g message-command-style bg=#7aa2f7,fg=#1a1b26,bold

# -- copy to system clipboard (if available) -------------------
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard 2>/dev/null || xsel --clipboard 2>/dev/null || pbcopy 2>/dev/null"

# -- break/join panes ------------------------------------------
bind b break-pane -d          # pane → own window
bind J command-prompt -p "join pane from:" "join-pane -s %1"

# -- popup fzf session picker ----------------------------------
bind s display-popup -E -w 60% -h 60% "tmux list-sessions | $HOME/.fzf/bin/fzf --reverse --prompt='session> ' --bind 'enter:execute(tmux switch-client -t {1})+abort'"

# -- plugins ---------------------------------------------------
run '$HOME/.tmux/plugins/tpm/tpm'
run '$HOME/.tmux/plugins/tmux-which-key/plugin.sh.tmux'